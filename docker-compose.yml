version: '3.8'

services:
  backend:
    build: ./backend
    container_name: edupulse_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - edupulse_network

  frontend:
    build: ./frontend/EduPulse AI
    container_name: edupulse_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - edupulse_network

networks:
  edupulse_network:
    driver: bridge